name: deploy-cloud-run

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "publish" ]
    types: [ completed ]
    branches: [ main ]

env:
  SERVICE_NAME: crypto

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy "${{ env.SERVICE_NAME }}"
          --region "${{ secrets.GCP_REGION }}"
          --platform managed
          --allow-unauthenticated
          --image "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/crypto:${{ steps.tag.outputs.tag }}"
          --set-env-vars "ASPNETCORE_ENVIRONMENT=Production,SWAGGER_ENABLED=${{ vars.SWAGGER_ENABLED || 'false' }},API_KEY=${{ secrets.API_KEY }},CLICKHOUSE_PROTOCOL=${{ vars.CLICKHOUSE_PROTOCOL || 'http' }},CLICKHOUSE_HOST=${{ vars.CLICKHOUSE_HOST }},CLICKHOUSE_PORT=${{ vars.CLICKHOUSE_PORT || '8123' }},CLICKHOUSE_DATABASE=${{ vars.CLICKHOUSE_DATABASE || '__default__' }},CLICKHOUSE_USER=${{ vars.CLICKHOUSE_USER }},CLICKHOUSE_TIMEOUT_SECONDS=${{ vars.CLICKHOUSE_TIMEOUT_SECONDS || '10' }},CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}"
